<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🕵️ El Impostor - Cluster Host</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .room-code-display {
            text-align: center;
            background: rgba(0, 243, 255, 0.1);
            border: 2px dashed var(--neon-cyan);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            border-radius: var(--border-radius);
        }
        .room-code-display h1 {
            font-size: 3rem;
            color: var(--neon-cyan);
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        .impostor-selector {
            display: flex;
            gap: 1rem;
        }
        .impostor-selector button {
            flex: 1;
        }
        .impostor-selector button.active {
            background: var(--neon-cyan);
            color: #000;
            border-color: var(--neon-cyan);
        }
        .full-width {
            width: 100%;
        }
        .status-display {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--neon-yellow);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Cluster Host</h1>
            <button id="back-btn" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;">⬅ Volver</button>
        </header>

        <main class="content-section">
            <!-- Setup Section -->
            <div id="setup-section" class="card slide-in-up">
                <h2>🛠 Configuración de Sala</h2>
                <div class="form-group">
                    <label class="form-label">API Key (Gemini)</label>
                    <input type="password" id="api-key" class="form-input" placeholder="Ingresa tu API Key">
                    <p class="input-help">Opcional. Si no tienes, se usarán palabras predefinidas.</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Número de Impostores</label>
                    <div class="impostor-selector" id="impostor-selector">
                        <button class="btn btn-secondary active" data-count="1">1 Impostor</button>
                        <button class="btn btn-secondary" data-count="2">2 Impostores</button>
                    </div>
                </div>
                <button id="create-lobby-btn" class="btn btn-primary full-width">
                    <span class="btn-icon">📡</span> Crear Sala
                </button>
            </div>

            <!-- Lobby Section (Hidden initially) -->
            <div id="lobby-section" class="card hidden">
                <h2>👥 Sala de Espera</h2>
                <div class="room-code-display">
                    <p style="margin-bottom: 5px; color: #888;">CÓDIGO DE SALA</p>
                    <h1 id="room-code">...</h1>
                </div>
                
                <div class="players-list-container">
                    <h3>Jugadores (<span id="player-count">0</span>)</h3>
                    <ul id="players-list" class="rules-list">
                        <!-- Players will be added here dynamically -->
                    </ul>
                </div>
                
                <div class="form-actions">
                    <button id="start-game-btn" class="btn btn-primary full-width" disabled>
                        <span class="btn-icon">🚀</span> Comenzar Juego
                    </button>
                </div>
            </div>
            
            <!-- Game Controls (Hidden initially) -->
            <div id="game-controls" class="card hidden">
                <h2>🎮 Control de Juego</h2>
                <div id="game-status" class="status-display">Generando partida...</div>
                
                <div class="game-actions" style="flex-direction: column;">
                     <button id="reveal-my-role-btn" class="btn btn-secondary full-width">
                        <span class="btn-icon">👁️</span> Ver Mi Rol
                     </button>
                     
                     <!-- Host Voting Area -->
                     <div id="host-voting-area" class="hidden" style="margin: 1rem 0;">
                        <h3>Tu Voto:</h3>
                        <ul id="host-voting-list" class="voting-list" style="list-style: none; padding: 0;">
                            <!-- Buttons generated here -->
                        </ul>
                        <button id="host-submit-vote-btn" class="btn btn-danger full-width" disabled>ENVIAR VOTO</button>
                     </div>

                     <div id="host-controls" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                        <button id="start-discussion-btn" class="btn btn-primary full-width hidden">
                            <span class="btn-icon">🗣️</span> Iniciar Discusión
                        </button>
                        <button id="start-voting-btn" class="btn btn-warning full-width hidden">
                            <span class="btn-icon">🗳️</span> Iniciar Votación
                        </button>
                        <button id="show-results-btn" class="btn btn-success full-width hidden">
                            <span class="btn-icon">🏆</span> Mostrar Resultados
                        </button>
                        <button id="new-game-btn" class="btn btn-secondary full-width hidden">
                            <span class="btn-icon">🔄</span> Nueva Partida
                        </button>
                     </div>
                </div>
            </div>
        </main>
        
        <!-- Modal for Role Reveal -->
        <div id="role-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Tu Identidad</h3>
                    <button class="modal-close" id="close-role-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="reveal-content">
                        <h2 id="role-title" class="role-title">...</h2>
                        <div id="secret-word-container" class="hidden">
                            <p>La palabra secreta es:</p>
                            <div id="secret-word" class="keyword">...</div>
                        </div>
                        <p id="role-hint" class="hint">...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/cluster-manager.js"></script>
    <script src="js/cluster-host.js"></script>
</body>
</html>
